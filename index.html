<script>
'use strict';

// ── Global error trap — shows real error in the UI instead of "Script error." ─
window.addEventListener('error', e => {
  const msg = `JS ERROR: ${e.message} @ line ${e.lineno}`;
  const el = document.getElementById('error-msg');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
  console.error(msg);
});
window.addEventListener('unhandledrejection', e => {
  const msg = `PROMISE ERROR: ${e.reason}`;
  const el = document.getElementById('error-msg');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
  console.error(msg);
});

const BG       = '#080808';
const SCOPE_BG = '#040a04';
const BORDER   = '#242424';
const AMBER    = '#e8920a';
const GREEN    = '#2ecc71';

const STRING_COLORS = [
  {wave:'#ff5533', glow:'rgba(255,85,51,0.7)'},
  {wave:'#e8920a', glow:'rgba(232,146,10,0.7)'},
  {wave:'#c8e80a', glow:'rgba(200,232,10,0.7)'},
  {wave:'#0ae84a', glow:'rgba(10,232,74,0.7)'},
  {wave:'#0ae8c8', glow:'rgba(10,232,200,0.7)'},
  {wave:'#3a8aff', glow:'rgba(58,138,255,0.7)'},
];
const LABELS = ['I','II','III','IV','V','VI'];
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function hzToNote(hz) {
  const midi = Math.round(12 * Math.log2(Math.max(hz,1)/440) + 69);
  return NOTE_NAMES[((midi%12)+12)%12] + (Math.floor(midi/12)-1);
}
function fmtDamp(v) { return v>=1000 ? (v/1000).toFixed(1)+'k' : Math.round(v)+''; }

// Strings tuned to prime harmonics of A1=55Hz (harmonics 1,3,5,7,11,13).
// All share a common fundamental so they form a just-intonation harmonic
// series chord. Damping at ~10× each fundamental for sitar-like brightness.
const strings = [
  {pitch:55.000,  decay:0.800, damping:550,  active:true},  // 1×A1  root
  {pitch:165.000, decay:0.800, damping:1650, active:true}, // 3×A1  fifth (just)
  {pitch:275.000, decay:0.800, damping:2750, active:true}, // 5×A1  major third (just, -14¢)
  {pitch:385.000, decay:0.800, damping:3850, active:true}, // 7×A1  blue seventh (-31¢)
  {pitch:605.000, decay:0.800, damping:6000, active:true}, // 11×A1 undecimal tritone (-49¢)
  {pitch:715.000, decay:0.800, damping:7000, active:true}, // 13×A1 neutral sixth (+41¢)
];
let masterWet  = 0.75;
let masterGain = 1.10;

// Audio nodes
let audioCtx=null, micStream=null, rmsTimer=null, scopeRAF=null;
let masterGainNode=null, dryGainNode=null, masterAnalyser=null, inputTrim=null;
let masterCompressor=null;
let inputGateNode=null;
let micMuted = false;
let inAnalyser=null;
const MIC_OPEN_THRESHOLD  = 0.060;   // open gate: real voice ~0.1+ RMS, headphone bleed ~0.01-0.04
const MIC_CLOSE_THRESHOLD = 0.018;   // close gate: only when truly quiet
let prevInputPresent = false;          // tracks last gate state to avoid setTargetAtTime spam
const perString    = [];
const strAnalysers = Array(6).fill(null);

// ── LED helper ────────────────────────────────────────────────────────────────
function setLED(id, on, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.background   = on ? color : '#111';
  el.style.boxShadow    = on ? `0 0 7px 2px ${color}` : 'none';
  el.style.borderColor  = on ? color : BORDER;
}

// ── Knob SVG ──────────────────────────────────────────────────────────────────
function drawKnob(svg, val, min, max, color, sz) {
  const norm  = Math.max(0, Math.min(1, (val-min)/(max-min)));
  const angle = -135 + norm*270;
  const r  = sz/2 - 7;
  const cx = sz/2, cy = sz/2;
  const t  = 2*Math.PI*r;
  svg.innerHTML = `
    <circle cx="${cx}" cy="${cy}" r="${r+5}" fill="#1c1c1c" stroke="${BORDER}" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#5a3804" stroke-width="2.5"
      stroke-dasharray="${t*0.75} ${t*0.25}" stroke-dashoffset="${t*0.125}"
      stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="2.5"
      stroke-dasharray="${t*0.75*norm} ${t}" stroke-dashoffset="${t*0.125}"
      stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"
      style="filter:drop-shadow(0 0 3px ${color})"/>
    <line x1="${cx}" y1="${cy}"
      x2="${cx+(r-2)*Math.sin(angle*Math.PI/180)}"
      y2="${cy-(r-2)*Math.cos(angle*Math.PI/180)}"
      stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="${BG}" stroke="${color}" stroke-width="1"/>`;
}

function attachKnob(svg, getVal, setVal, min, max, step, color, sz, onUpdate) {
  let dragging=false, startY=0, startVal=0;
  svg.addEventListener('pointerdown', e => {
    dragging=true; startY=e.clientY; startVal=getVal();
    svg.setPointerCapture(e.pointerId); e.preventDefault();
  }, {passive:false});
  svg.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dy = startY - e.clientY;
    let nv = Math.min(max, Math.max(min, startVal + (dy/110)*(max-min)));
    nv = step < 1 ? parseFloat(nv.toFixed(4)) : Math.round(nv/step)*step;
    setVal(nv);
    drawKnob(svg, nv, min, max, color, sz);
    onUpdate(nv);
  });
  svg.addEventListener('pointerup', () => { dragging=false; });
  svg.addEventListener('pointercancel', () => { dragging=false; });
}

// ── Build DOM ─────────────────────────────────────────────────────────────────
function buildUI() {
  const col = document.getElementById('strings-col');
  const botLeds = document.getElementById('bottom-leds');

  strings.forEach((s, i) => {
    const sc = STRING_COLORS[i];

    const row = document.createElement('div');
    row.className = 'string-row';
    row.id = `row-${i}`;

    const lc = document.createElement('div');
    lc.className = 'str-label-col';
    const led = document.createElement('div');
    led.className = 'led'; led.id = `led-str-${i}`;
    const btn = document.createElement('button');
    btn.className = 'str-toggle'; btn.textContent = LABELS[i];
    btn.style.color = sc.wave;
    btn.addEventListener('click', () => toggleString(i));
    lc.appendChild(led); lc.appendChild(btn);

    const sw = document.createElement('div');
    sw.className = 'scope-wrap';
    const canvas = document.createElement('canvas');
    canvas.className = 'scope'; canvas.id = `scope-${i}`;
    canvas.width=400; canvas.height=120;
    sw.appendChild(canvas);

    const kg = document.createElement('div');
    kg.className = 'knobs-group';

    const knobDefs = [
      {key:'pitch',   min:30,  max:900,  step:0.1,  label:'PITCH', fmt:v=>hzToNote(v)},
      {key:'decay',   min:0.5, max:0.999,step:0.001,label:'DECAY', fmt:v=>v.toFixed(3)},
      {key:'damping', min:200, max:8000, step:10,   label:'DAMP',  fmt:v=>fmtDamp(v)},
    ];

    knobDefs.forEach(def => {
      const kc = document.createElement('div');
      kc.className = 'knob-col';

      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('class','knob');
      svg.setAttribute('width','44'); svg.setAttribute('height','44');
      svg.setAttribute('viewBox','0 0 44 44');
      drawKnob(svg, s[def.key], def.min, def.max, sc.wave, 44);

      const valEl = document.createElement('div');
      valEl.className = 'knob-val'; valEl.style.color = sc.wave;
      valEl.id = `val-${i}-${def.key}`;
      valEl.textContent = def.fmt(s[def.key]);

      const lblEl = document.createElement('div');
      lblEl.className = 'knob-lbl'; lblEl.textContent = def.label;

      attachKnob(svg,
        () => strings[i][def.key],
        v  => { strings[i][def.key]=v; },
        def.min, def.max, def.step, sc.wave, 44,
        v => {
          valEl.textContent = def.fmt(v);
          if (def.key==='pitch') {
            const nb = document.getElementById(`note-bot-${i}`);
            if (nb) nb.textContent = hzToNote(v);
          }
          syncAudioParams();
        }
      );

      kc.appendChild(svg); kc.appendChild(valEl); kc.appendChild(lblEl);
      kg.appendChild(kc);
    });

    row.appendChild(lc); row.appendChild(sw); row.appendChild(kg);
    col.appendChild(row);

    blankScope(canvas);

    const bd = document.createElement('div'); bd.className='bottom-string';
    const bl = document.createElement('div'); bl.className='led'; bl.id=`led-bot-${i}`;
    const bn = document.createElement('span'); bn.className='bottom-note';
    bn.id=`note-bot-${i}`; bn.style.color=sc.wave; bn.textContent=hzToNote(s.pitch);
    bd.appendChild(bl); bd.appendChild(bn);
    botLeds.appendChild(bd);
  });

  // Master knobs
  const wetSvg = document.getElementById('knob-wet');
  drawKnob(wetSvg, masterWet, 0, 1, '#0ae8c8', 54);
  attachKnob(wetSvg, ()=>masterWet, v=>{masterWet=v;}, 0, 1, 0.01, '#0ae8c8', 54, v=>{
    document.getElementById('val-wet').textContent = Math.round(v*100)+'%';
    syncAudioParams();
  });

  const gainSvg = document.getElementById('knob-gain');
  drawKnob(gainSvg, masterGain, 0, 1.5, AMBER, 54);
  attachKnob(gainSvg, ()=>masterGain, v=>{masterGain=v;}, 0, 1.5, 0.01, AMBER, 54, v=>{
    document.getElementById('val-gain').textContent = Math.round(v*100)+'%';
    syncAudioParams();
  });

  document.getElementById('engage-btn').addEventListener('click', toggleAudio);
  document.getElementById('sweep-btn').addEventListener('click', runTestSweep);
  document.getElementById('mic-mute-btn').addEventListener('click', toggleMicMute);
}

// ── Toggle string ────────────────────────────────────────────────────────────
function toggleString(i) {
  strings[i].active = !strings[i].active;
  const on = strings[i].active;
  document.getElementById(`row-${i}`).style.opacity = on ? '1' : '0.4';
  const btn = document.querySelector(`#row-${i} .str-toggle`);
  btn.style.color = on ? STRING_COLORS[i].wave : '#8a8480';
  const nb = document.getElementById(`note-bot-${i}`);
  if (nb) nb.style.opacity = on ? '1' : '0.3';
  syncAudioParams();
}

// ── Sync audio ────────────────────────────────────────────────────────────────
function activeWetGain() {
  const n = Math.max(1, strings.filter(s => s.active).length);
  return masterWet / n;
}

function syncAudioParams() {
  if (!audioCtx || !perString.length) return;
  const now = audioCtx.currentTime;
  const wg = activeWetGain();
  strings.forEach((s,i) => {
    perString[i].delay.delayTime.setTargetAtTime(1/s.pitch, now, 0.015);
    perString[i].feedback.gain.setTargetAtTime(s.active?s.decay:0, now, 0.015);
    perString[i].damper.frequency.setTargetAtTime(s.damping, now, 0.015);
    perString[i].wetGain.gain.setTargetAtTime(s.active?wg:0, now, 0.015);
  });
  if (masterGainNode) masterGainNode.gain.setTargetAtTime(masterGain, now, 0.015);
  if (dryGainNode)    dryGainNode.gain.setTargetAtTime(0, now, 0.015);
}

// ── Audio engine ─────────────────────────────────────────────────────────────
async function toggleAudio() {
  if (audioCtx) { stopAudio(); return; }

  const btn = document.getElementById('engage-btn');
  btn.textContent = '… STARTING';
  btn.style.borderColor = '#5a3804';
  btn.style.color = '#5a3804';
  showError('');

  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) throw new Error('Web Audio API not available.');

    // Create AudioContext synchronously in the gesture handler — Safari requires
    // this to happen before any awaits to maintain the gesture context.
    // Explicitly match iPad hardware sample rate (48kHz) to avoid silent
    // resampling mismatches in iOS's audio session.
    audioCtx = new AC({sampleRate: 48000});

    // Get mic stream — minimal constraints. Omitting echoCancellation/
    // noiseSuppression/autoGainControl entirely (rather than setting false)
    // avoids forcing iOS into a "communications" audio session category,
    // which can silently mute the raw signal path on some iOS versions.
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: true, video: false
      });
    } catch(e) {
      throw new Error('Mic denied -- Settings → Privacy → Microphone → Safari → On');
    }

    // Resume AFTER getting the stream
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    // Show real device labels in picker now that permission is granted
    try {
      await populateInputPicker();
      document.getElementById('input-picker-wrap').style.display = 'flex';
      const track = micStream.getAudioTracks()[0];
      document.getElementById('input-picker-label').textContent = track?.label ? 'IN ✓' : 'IN';
    } catch(e) { /* picker population is non-critical */ }

    const src = audioCtx.createMediaStreamSource(micStream);

    inAnalyser = audioCtx.createAnalyser();
    inAnalyser.fftSize = 512;
    inAnalyser.smoothingTimeConstant = 0;

    // Input gate node — opened fully once the graph is built; the watchdog
    // below is what actually prevents runaway, not this gate.
    inputGateNode = audioCtx.createGain();
    inputGateNode.gain.value = 0;
    src.connect(inputGateNode);

    src.connect(inAnalyser);

    // Musical compressor — gentle, transparent, -18 dB threshold, 4:1, 3 ms attack.
    masterCompressor = audioCtx.createDynamicsCompressor();
    masterCompressor.threshold.value = -18;
    masterCompressor.knee.value       =   6;
    masterCompressor.ratio.value      =   4;
    masterCompressor.attack.value     = 0.003;
    masterCompressor.release.value    = 0.25;

    // Ceiling compressor — brickwall-ish safety net, -6 dB, 20:1, 1 ms attack.
    const ceilingCompressor = audioCtx.createDynamicsCompressor();
    ceilingCompressor.threshold.value = -6;
    ceilingCompressor.knee.value       =  1;
    ceilingCompressor.ratio.value      = 20;
    ceilingCompressor.attack.value     = 0.001;
    ceilingCompressor.release.value    = 0.1;

    // Hard clip at ±0.9 — last line of defense before destination.
    const hardClip = audioCtx.createWaveShaper();
    const clipCurve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 255 - 1;
      clipCurve[i] = Math.max(-0.9, Math.min(0.9, x));
    }
    hardClip.curve = clipCurve;

    masterGainNode = audioCtx.createGain(); masterGainNode.gain.value=masterGain;
    masterAnalyser = audioCtx.createAnalyser(); masterAnalyser.fftSize=2048;

    // Signal chain: masterGainNode → compressor → ceilingCompressor → hardClip → analyser → destination
    masterGainNode.connect(masterCompressor);
    masterCompressor.connect(ceilingCompressor);
    ceilingCompressor.connect(hardClip);
    hardClip.connect(masterAnalyser);
    masterAnalyser.connect(audioCtx.destination);

    dryGainNode = audioCtx.createGain(); dryGainNode.gain.value=0;
    inputGateNode.connect(dryGainNode); dryGainNode.connect(masterGainNode);

    // Input trim — attenuates raw mic signal before it hits the comb loops.
    // Mic line level can be much hotter than these resonators were tuned for;
    // this brings excitation down to a sane operating point.
    inputTrim = audioCtx.createGain();
    inputTrim.gain.value = 0.15;
    inputGateNode.connect(inputTrim);

    perString.length=0;
    for (let i=0;i<6;i++) {
      const s=strings[i];

      const delay=audioCtx.createDelay(2.0); delay.delayTime.value=1/s.pitch;

      // Pre-filter: bandpass at each string's fundamental so only energy near
      // that pitch enters the comb filter. Without this the comb filter's many
      // harmonic peaks respond to almost any voice pitch.
      const inputFilter = audioCtx.createBiquadFilter();
      inputFilter.type = 'bandpass';
      inputFilter.frequency.value = s.pitch;
      inputFilter.Q.value = 8;

      // DC blocking highpass — prevents DC offset from accumulating in the
      // feedback loop and walking the operating point off-center.
      const dcBlock = audioCtx.createBiquadFilter();
      dcBlock.type = 'highpass';
      dcBlock.frequency.value = 20;
      dcBlock.Q.value = 0.707;

      const damper=audioCtx.createBiquadFilter(); damper.type='lowpass'; damper.frequency.value=s.damping; damper.Q.value=0.707;

      const feedback=audioCtx.createGain(); feedback.gain.value = s.active ? s.decay : 0;
      const wetGain=audioCtx.createGain(); wetGain.gain.value=s.active?activeWetGain():0;

      // Comb filter loop: inputFilter → delay → dcBlock → damper → feedback → delay
      inputTrim.connect(inputFilter);
      inputFilter.connect(delay);
      delay.connect(dcBlock);
      dcBlock.connect(damper);
      damper.connect(feedback);
      feedback.connect(delay);

      damper.connect(wetGain);
      wetGain.connect(masterGainNode);

      const an=audioCtx.createAnalyser(); an.fftSize=512;
      damper.connect(an); strAnalysers[i]=an;

      perString.push({delay, inputFilter, dcBlock, damper, feedback, wetGain});
    }

    // RMS LEDs + anti-runaway watchdog
    const inBuf = new Uint8Array(inAnalyser.fftSize);
    const strBufs=Array.from({length:6},(_,i)=>new Float32Array(strAnalysers[i].fftSize));

    // Gate starts closed; the RMS loop opens it when real signal is detected.
    prevInputPresent = false;

    rmsTimer = setInterval(()=>{
      inAnalyser.getByteTimeDomainData(inBuf);
      let sum = 0;
      for (let k = 0; k < inBuf.length; k++) {
        const v = (inBuf[k] - 128) / 128;
        sum += v * v;
      }
      const inRms = Math.sqrt(sum / inBuf.length);
      const rmsEl = document.getElementById('rms-readout');
      if (rmsEl) rmsEl.textContent = `MIC: ${inRms.toFixed(4)}`;

      // Hysteresis gate: higher threshold to open (avoids headphone bleed triggering),
      // lower threshold to close (avoids flicker when voice is present).
      const gateThreshold = prevInputPresent ? MIC_CLOSE_THRESHOLD : MIC_OPEN_THRESHOLD;
      const inputPresent = !micMuted && inRms > gateThreshold;
      setLED('led-mic', inputPresent, GREEN);
      if (inputPresent !== prevInputPresent) {
        inputGateNode.gain.setTargetAtTime(
          inputPresent ? 1 : 0, audioCtx.currentTime, inputPresent ? 0.01 : 0.15
        );
        prevInputPresent = inputPresent;
      }

      strBufs.forEach((buf,i)=>{
        strAnalysers[i].getFloatTimeDomainData(buf);
        const r=rms(buf);
        const hot=r>0.004&&strings[i].active;
        setLED(`led-str-${i}`,hot,STRING_COLORS[i].wave);
        setLED(`led-bot-${i}`,hot,STRING_COLORS[i].wave);
        document.getElementById(`row-${i}`).style.borderColor=hot?STRING_COLORS[i].wave+'55':BORDER;
      });
    },60);

    startScopes();

    btn.textContent='■ STOP';
    btn.style.borderColor='#5a1a1a'; btn.style.color='#c04040';
    btn.style.background='transparent'; btn.style.boxShadow='none';
    setLED('led-run', true, AMBER);
    document.getElementById('sweep-btn').style.display = 'inline-block';
    document.getElementById('mic-mute-btn').style.display = 'inline-block';

  } catch(e) {
    showError(e.message);
    btn.textContent='▶ ENGAGE';
    btn.style.borderColor=AMBER; btn.style.color=AMBER;
    btn.style.background='rgba(232,146,10,0.10)';
    micStream?.getTracks().forEach(t=>t.stop()); micStream=null;
    audioCtx?.close(); audioCtx=null;
  }
}

function stopAudio() {
  clearInterval(rmsTimer);
  stopScopes();
  micStream?.getTracks().forEach(t=>t.stop()); micStream=null;
  audioCtx?.close(); audioCtx=null;
  masterGainNode=null; dryGainNode=null; masterAnalyser=null; masterCompressor=null; inputGateNode=null; inAnalyser=null; inputTrim=null;
  document.getElementById('input-picker-wrap').style.display = 'none';
  document.getElementById('input-picker-label').textContent = 'IN';
  document.getElementById('sweep-btn').style.display = 'none';
  micMuted = false;
  const mmb = document.getElementById('mic-mute-btn');
  mmb.style.display = 'none'; mmb.textContent = 'MIC ON'; mmb.classList.remove('muted');
  perString.length=0;
  for(let i=0;i<6;i++) strAnalysers[i]=null;
  const btn=document.getElementById('engage-btn');
  btn.textContent='▶ ENGAGE'; btn.style.borderColor=AMBER;
  btn.style.color=AMBER; btn.style.background='rgba(232,146,10,0.10)';
  btn.style.boxShadow='0 0 16px rgba(232,146,10,0.10)';
  setLED('led-run',false,AMBER); setLED('led-mic',false,GREEN);
  for(let i=0;i<6;i++){
    setLED(`led-str-${i}`,false,STRING_COLORS[i].wave);
    setLED(`led-bot-${i}`,false,STRING_COLORS[i].wave);
    document.getElementById(`row-${i}`).style.borderColor=BORDER;
    blankScope(document.getElementById(`scope-${i}`));
  }
  blankScope(document.getElementById('master-scope'));
  blankScope(document.getElementById('input-scope'));
}

// ── Mic mute toggle ───────────────────────────────────────────────────────────
function toggleMicMute() {
  micMuted = !micMuted;
  const btn = document.getElementById('mic-mute-btn');
  btn.textContent = micMuted ? 'MIC OFF' : 'MIC ON';
  btn.classList.toggle('muted', micMuted);
  if (micMuted && inputGateNode) {
    inputGateNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
    prevInputPresent = false;
  }
}

// ── Pluck — injects a short noise burst directly into each active string's
//    delay line. The burst is too brief to be audible as a tone; only the
//    string's resonant decay is heard.
function runTestSweep() {
  if (!audioCtx || !perString.length) return;

  const pluckMs = 30;
  const bufLen  = Math.ceil(audioCtx.sampleRate * pluckMs / 1000);
  const buf     = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data    = buf.getChannelData(0);
  for (let k = 0; k < bufLen; k++) {
    // Exponential decay envelope on white noise
    data[k] = (Math.random() * 2 - 1) * 0.5 * Math.exp(-k / (bufLen * 0.4));
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  perString.forEach((s, i) => { if (strings[i].active) src.connect(s.delay); });
  src.start(audioCtx.currentTime + 0.02);
}

// ── Scope drawing ─────────────────────────────────────────────────────────────
function rms(buf) { return Math.sqrt(buf.reduce((s,v)=>s+v*v,0)/buf.length); }

function blankScope(canvas) {
  if (!canvas) return;
  const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height;
  ctx.fillStyle=SCOPE_BG; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
}

function drawWave(ctx, W, H, buf, color, glow, isMaster) {
  const bright=Math.min(1, rms(buf)*28);
  ctx.fillStyle=SCOPE_BG; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=isMaster?'#0a1e0a':'rgba(255,255,255,0.03)';
  ctx.lineWidth=0.5;
  [H/4,H/2,3*H/4].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();});
  [W/4,W/2,3*W/4].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});
  if (bright>0.01) {
    ctx.strokeStyle=color;
    ctx.globalAlpha=isMaster?1:0.25+bright*0.75;
    ctx.lineWidth=isMaster?2:1.8;
    ctx.shadowColor=glow; ctx.shadowBlur=bright*(isMaster?8:12);
    ctx.beginPath();
    for(let i=0;i<W;i++){
      const s=buf[Math.floor(i*buf.length/W)];
      const y=(1-(s*0.85+1)/2)*H;
      i===0?ctx.moveTo(i,y):ctx.lineTo(i,y);
    }
    ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  } else {
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  }
}

function startScopes() {
  stopScopes();
  const ic=document.getElementById('input-scope');
  const iCtx=ic ? ic.getContext('2d') : null;
  const iBuf=new Uint8Array(inAnalyser ? inAnalyser.fftSize : 512);
  const mc=document.getElementById('master-scope');
  const mCtx=mc.getContext('2d'); const mW=mc.width, mH=mc.height;
  const mBuf=new Float32Array(masterAnalyser.fftSize);
  const scs=Array.from({length:6},(_,i)=>document.getElementById(`scope-${i}`));
  const sCtxs=scs.map(c=>c.getContext('2d'));
  const sBufs=Array.from({length:6},(_,i)=>new Float32Array(strAnalysers[i].fftSize));

  function frame() {
    scopeRAF=requestAnimationFrame(frame);
    // Input scope — byte data, amber color
    if (iCtx && inAnalyser) {
      inAnalyser.getByteTimeDomainData(iBuf);
      const W=ic.width, H=ic.height;
      iCtx.fillStyle=SCOPE_BG; iCtx.fillRect(0,0,W,H);
      iCtx.strokeStyle=AMBER; iCtx.lineWidth=1.5; iCtx.globalAlpha=0.9;
      iCtx.beginPath();
      for(let i=0;i<W;i++){
        const v=(iBuf[Math.floor(i*iBuf.length/W)]-128)/128;
        const y=(1-(v*4+1)/2)*H; // scale up 4x so quiet mic is visible
        i===0?iCtx.moveTo(i,y):iCtx.lineTo(i,y);
      }
      iCtx.stroke(); iCtx.globalAlpha=1;
    }
    masterAnalyser.getFloatTimeDomainData(mBuf);
    drawWave(mCtx,mW,mH,mBuf,GREEN,GREEN,true);
    for(let i=0;i<6;i++){
      const c=scs[i];
      if(!strAnalysers[i]||!strings[i].active){blankScope(c);continue;}
      strAnalysers[i].getFloatTimeDomainData(sBufs[i]);
      drawWave(sCtxs[i],c.width,c.height,sBufs[i],STRING_COLORS[i].wave,STRING_COLORS[i].glow,false);
    }
  }
  frame();
}
function stopScopes(){if(scopeRAF){cancelAnimationFrame(scopeRAF);scopeRAF=null;}}

function showError(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg; el.style.display=msg?'block':'none';
}

// ── Input device picker ───────────────────────────────────────────────────────
async function populateInputPicker() {
  const picker = document.getElementById('input-picker');
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const inputs  = devices.filter(d => d.kind === 'audioinput');
    const current = picker.value;
    picker.innerHTML = '';
    inputs.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d.deviceId;
      // Label falls back to a numbered name if browser withholds it pre-permission
      opt.textContent = d.label || `Microphone ${picker.options.length + 1}`;
      picker.appendChild(opt);
    });
    // Restore previous selection if still available, else prefer built-in
    if (current && [...picker.options].some(o => o.value === current)) {
      picker.value = current;
    } else {
      const builtIn = inputs.findIndex(d => /built.in|internal/i.test(d.label));
      if (builtIn >= 0) picker.selectedIndex = builtIn;
    }
  } catch(e) { /* enumerateDevices not available — picker stays empty */ }
}

// Enumerate on load (labels may be blank until permission granted)
populateInputPicker();
// Re-enumerate if devices change (e.g. USB-C adapter plugged in/out)
navigator.mediaDevices.addEventListener('devicechange', populateInputPicker);

// ── Init ─────────────────────────────────────────────────────────────────────
buildUI();
</script>
